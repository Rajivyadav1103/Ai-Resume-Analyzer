{% extends 'base.html' %} {% block content %}
<div class="row g-4">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-body">
        <h5>Total Users</h5>
        <h2>{{ total_users }}</h2>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-body">
        <h5>Total Analyses</h5>
        <h2>{{ total_analyses }}</h2>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-body">
        <h5>Common Missing Skills</h5>
        <ul>
          {% for skill, count in common_missing_skills %}
          <li>{{ skill }} ({{ count }})</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
{% endblock %}
