{% extends 'base.html' %} {% block content %}
<div class="row g-4">
  <div class="col-lg-8">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="mb-3">Analyze Resume</h4>
        <form id="analysisForm" method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label for="resume_file" class="form-label">Upload Resume</label>
            <input
              id="resume_file"
              type="file"
              name="resume_file"
              class="form-control"
              accept=".pdf,.docx"
            />
          </div>
          <div class="mb-3">
            <label for="resume_text" class="form-label">Or paste resume text</label>
            <textarea
              id="resume_text"
              name="resume_text"
              class="form-control"
              rows="8"
              placeholder="Paste resume content here..."
            >{{ resume_text|default('') }}</textarea>
            <div class="form-text">Provide either pasted resume text or upload a PDF/DOCX resume.</div>
          </div>
          <div class="mb-3">
            <label for="job_description" class="form-label">Job Description</label>
            <textarea
              id="job_description"
              name="job_description"
              class="form-control"
              rows="8"
              placeholder="Paste the job description here..."
              required
            >{{ job_description|default('') }}</textarea>
          </div>
          <div class="mb-3">
            <label for="provider" class="form-label">AI Provider</label>
            <select id="provider" name="provider" class="form-select">
              <option value="gemini" {% if provider|default('gemini') == 'gemini' %}selected{% endif %}>
                Google Gemini
              </option>
              <option value="openai" {% if provider == 'openai' %}selected{% endif %}>
                OpenAI
              </option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Analyze Resume</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <h5>How it works</h5>
        <ul>
          <li>Upload resume as PDF or DOCX</li>
          <li>Paste or upload the job description</li>
          <li>Select Gemini or OpenAI</li>
          <li>Receive ATS and match insights</li>
        </ul>
      </div>
    </div>
  </div>
</div>
{% endblock %}
